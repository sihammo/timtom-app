openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: نظام إدارة توزيع السلع - Distribution Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: distributors
    description: Distributor management
  - name: products
    description: Product/inventory management
  - name: stores
    description: Store management
  - name: tasks
    description: Task/delivery management
  - name: deliveries
    description: Delivery confirmations
  - name: accounting
    description: Financial accounting
  - name: map
    description: Map and location data
  - name: suggestions
    description: Store suggestions

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /distributors:
    get:
      operationId: getDistributors
      tags: [distributors]
      summary: Get all distributors
      responses:
        "200":
          description: List of distributors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Distributor"
    post:
      operationId: createDistributor
      tags: [distributors]
      summary: Create distributor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDistributorRequest"
      responses:
        "201":
          description: Distributor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Distributor"

  /distributors/{id}:
    get:
      operationId: getDistributor
      tags: [distributors]
      summary: Get distributor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Distributor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Distributor"
    put:
      operationId: updateDistributor
      tags: [distributors]
      summary: Update distributor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDistributorRequest"
      responses:
        "200":
          description: Updated distributor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Distributor"
    delete:
      operationId: deleteDistributor
      tags: [distributors]
      summary: Delete distributor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /distributors/{id}/location:
    put:
      operationId: updateDistributorLocation
      tags: [distributors]
      summary: Update distributor location (GPS tracking)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationUpdate"
      responses:
        "200":
          description: Location updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /stores:
    get:
      operationId: getStores
      tags: [stores]
      summary: Get all stores
      responses:
        "200":
          description: List of stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
    post:
      operationId: createStore
      tags: [stores]
      summary: Create store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreRequest"
      responses:
        "201":
          description: Store created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/{id}:
    get:
      operationId: getStore
      tags: [stores]
      summary: Get store by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Store details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
    put:
      operationId: updateStore
      tags: [stores]
      summary: Update store
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreRequest"
      responses:
        "200":
          description: Updated store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
    delete:
      operationId: deleteStore
      tags: [stores]
      summary: Delete store
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: Get all tasks
      parameters:
        - name: distributorId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed, cancelled]
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update task status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /deliveries:
    get:
      operationId: getDeliveries
      tags: [deliveries]
      summary: Get all deliveries
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending_admin, confirmed, rejected]
      responses:
        "200":
          description: List of deliveries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Delivery"
    post:
      operationId: createDelivery
      tags: [deliveries]
      summary: Submit delivery confirmation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeliveryRequest"
      responses:
        "201":
          description: Delivery submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"

  /deliveries/{id}/confirm:
    put:
      operationId: confirmDelivery
      tags: [deliveries]
      summary: Admin confirm delivery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivery confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"

  /deliveries/{id}/reject:
    put:
      operationId: rejectDelivery
      tags: [deliveries]
      summary: Admin reject delivery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectDeliveryRequest"
      responses:
        "200":
          description: Delivery rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"

  /accounting/summary:
    get:
      operationId: getAccountingSummary
      tags: [accounting]
      summary: Get accounting summary (profits, debts)
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month]
      responses:
        "200":
          description: Accounting summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingSummary"

  /accounting/debts/stores:
    get:
      operationId: getStoreDebts
      tags: [accounting]
      summary: Get store debts
      responses:
        "200":
          description: Store debts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoreDebt"

  /accounting/debts/distributors:
    get:
      operationId: getDistributorDebts
      tags: [accounting]
      summary: Get distributor debts
      responses:
        "200":
          description: Distributor debts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DistributorDebt"

  /accounting/settle/{distributorId}:
    post:
      operationId: settleDistributorAccount
      tags: [accounting]
      summary: Settle distributor account
      parameters:
        - name: distributorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettleAccountRequest"
      responses:
        "200":
          description: Account settled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /map/locations:
    get:
      operationId: getMapLocations
      tags: [map]
      summary: Get all map locations (stores + distributors)
      responses:
        "200":
          description: Map locations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapLocations"

  /suggestions:
    get:
      operationId: getStoreSuggestions
      tags: [suggestions]
      summary: Get store suggestions from distributors
      responses:
        "200":
          description: Store suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoreSuggestion"
    post:
      operationId: createStoreSuggestion
      tags: [suggestions]
      summary: Distributor suggests a new store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreSuggestionRequest"
      responses:
        "201":
          description: Suggestion submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSuggestion"

  /suggestions/{id}/approve:
    put:
      operationId: approveStoreSuggestion
      tags: [suggestions]
      summary: Admin approve store suggestion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Suggestion approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSuggestion"

  /suggestions/{id}/reject:
    put:
      operationId: rejectStoreSuggestion
      tags: [suggestions]
      summary: Admin reject store suggestion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Suggestion rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSuggestion"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [accounting]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [admin, distributor]
        phone:
          type: string
          nullable: true
        isActive:
          type: boolean
        distributorId:
          type: integer
          nullable: true
      required:
        - id
        - username
        - firstName
        - lastName
        - role
        - isActive

    Distributor:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        isActive:
          type: boolean
        username:
          type: string
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        lastSeen:
          type: string
          format: date-time
          nullable: true
        totalTasksCompleted:
          type: integer
        totalAmountCollected:
          type: number
        debt:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - firstName
        - lastName
        - phone
        - isActive
        - username
        - totalTasksCompleted
        - totalAmountCollected
        - debt
        - createdAt

    CreateDistributorRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        username:
          type: string
        password:
          type: string
      required:
        - firstName
        - lastName
        - phone
        - username
        - password

    UpdateDistributorRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        isActive:
          type: boolean
        password:
          type: string

    LocationUpdate:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
      required:
        - latitude
        - longitude

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        purchasePrice:
          type: number
        sellPrice:
          type: number
        quantity:
          type: integer
        lowStockThreshold:
          type: integer
        isLowStock:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - purchasePrice
        - sellPrice
        - quantity
        - lowStockThreshold
        - isLowStock
        - createdAt

    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
        purchasePrice:
          type: number
        sellPrice:
          type: number
        quantity:
          type: integer
        lowStockThreshold:
          type: integer
      required:
        - name
        - purchasePrice
        - sellPrice
        - quantity

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        purchasePrice:
          type: number
        sellPrice:
          type: number
        quantity:
          type: integer
        lowStockThreshold:
          type: integer

    Store:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        ownerName:
          type: string
        phone:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
          nullable: true
        debt:
          type: number
        totalVisits:
          type: integer
        lastVisit:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - ownerName
        - phone
        - latitude
        - longitude
        - debt
        - totalVisits
        - createdAt

    CreateStoreRequest:
      type: object
      properties:
        name:
          type: string
        ownerName:
          type: string
        phone:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
      required:
        - name
        - ownerName
        - phone
        - latitude
        - longitude

    UpdateStoreRequest:
      type: object
      properties:
        name:
          type: string
        ownerName:
          type: string
        phone:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string

    TaskItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        price:
          type: number
      required:
        - productId
        - productName
        - quantity
        - price

    Task:
      type: object
      properties:
        id:
          type: integer
        distributorId:
          type: integer
        distributorName:
          type: string
        storeId:
          type: integer
        storeName:
          type: string
        storeLatitude:
          type: number
        storeLongitude:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/TaskItem"
        status:
          type: string
          enum: [pending, in_progress, completed, failed, cancelled]
        totalAmount:
          type: number
        notes:
          type: string
          nullable: true
        failureReason:
          type: string
          nullable: true
        distance:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - distributorId
        - distributorName
        - storeId
        - storeName
        - storeLatitude
        - storeLongitude
        - items
        - status
        - totalAmount
        - createdAt

    CreateTaskRequest:
      type: object
      properties:
        distributorId:
          type: integer
        storeId:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              quantity:
                type: integer
            required:
              - productId
              - quantity
        notes:
          type: string
      required:
        - distributorId
        - storeId
        - items

    UpdateTaskRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, in_progress, completed, failed, cancelled]
        notes:
          type: string
        failureReason:
          type: string

    Delivery:
      type: object
      properties:
        id:
          type: integer
        taskId:
          type: integer
        distributorId:
          type: integer
        distributorName:
          type: string
        storeId:
          type: integer
        storeName:
          type: string
        photoUrl:
          type: string
          nullable: true
        latitude:
          type: number
        longitude:
          type: number
        amountCollected:
          type: number
        status:
          type: string
          enum: [pending_admin, confirmed, rejected]
        rejectionReason:
          type: string
          nullable: true
        deliveredAt:
          type: string
          format: date-time
        confirmedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - taskId
        - distributorId
        - distributorName
        - storeId
        - storeName
        - latitude
        - longitude
        - amountCollected
        - status
        - deliveredAt

    CreateDeliveryRequest:
      type: object
      properties:
        taskId:
          type: integer
        photoUrl:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        amountCollected:
          type: number
      required:
        - taskId
        - latitude
        - longitude
        - amountCollected

    RejectDeliveryRequest:
      type: object
      properties:
        reason:
          type: string
      required:
        - reason

    AccountingSummary:
      type: object
      properties:
        period:
          type: string
        totalRevenue:
          type: number
        totalCost:
          type: number
        totalProfit:
          type: number
        totalStoreDebts:
          type: number
        totalDistributorDebts:
          type: number
        totalDeliveries:
          type: integer
        totalTasks:
          type: integer
      required:
        - period
        - totalRevenue
        - totalCost
        - totalProfit
        - totalStoreDebts
        - totalDistributorDebts
        - totalDeliveries
        - totalTasks

    StoreDebt:
      type: object
      properties:
        storeId:
          type: integer
        storeName:
          type: string
        ownerName:
